zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 18e6d704c777453d98a6835f393755ec
      name: 'Astra clients'
  host_groups:
    - uuid: 4c469bc127d64a34ba625f7f4244153f
      name: 'Astra clients'
  templates:
    - uuid: 2696cbf6209f45ea8ed58da2082a099c
      template: 'Template Astra Linux Basic'
      name: 'Template Astra Linux Basic'
      groups:
        - name: 'Astra clients'
      items:
        - uuid: 9f1a51ee992f4405b76f572b1744d24a
          name: 'ICMP ping'
          type: SIMPLE
          key: icmpping
          delay: 1m
          history: 30d
          trends: 90d
          value_type: UNSIGNED
        - uuid: 2afd48e645c44695973d95ceae72c412
          name: 'Zabbix agent ping'
          type: ZABBIX_ACTIVE
          key: agent.ping
          delay: 1m
          history: 30d
          trends: 90d
          value_type: UNSIGNED
          triggers:
            - uuid: 9a14f29f2f184476b95364f481202bdc
              expression: 'last(/Template Astra Linux Basic/icmpping)=1 and nodata(/Template Astra Linux Basic/agent.ping,{$AGENT.NODATA})=1'
              name: 'Zabbix agent is unavailable while host is reachable by ICMP'
              priority: WARNING
        - uuid: 7367c5f8babb479f9b7116bda079f31f
          name: 'Astra Linux: build version'
          type: ZABBIX_ACTIVE
          key: 'vfs.file.contents[/etc/astra_version]'
          delay: 1h
          history: 90d
          trends: '0'
          value_type: TEXT
          triggers:
            - uuid: 34ea47e8691d4673b14b02713757cce5
              expression: 'change(/Template Astra Linux Basic/vfs.file.contents[/etc/astra_version])=1'
              name: 'Astra Linux: build version has changed'
              opdata: 'Current version: {ITEM.LASTVALUE}'
              priority: INFO
              manual_close: 'YES'
        - uuid: 9dd4ed1da70447d7892e70fa31143de3
          name: 'Dr.Web: config daemon active state'
          type: ZABBIX_ACTIVE
          key: 'systemd.unit.info[drweb-configd.service,ActiveState]'
          delay: 1m
          history: 30d
          trends: '0'
          value_type: CHAR
          triggers:
            - uuid: e63a2a31391644708d0577f00a2d477a
              expression: 'last(/Template Astra Linux Basic/systemd.unit.info[drweb-configd.service,ActiveState])<>"active"'
              name: 'Dr.Web: config daemon is not active'
              opdata: 'Current state: {ITEM.LASTVALUE}'
              priority: HIGH
        - uuid: f56b9719771f4e3f86d4f46405b5db1f
          name: 'Dr.Web: base information'
          type: ZABBIX_ACTIVE
          key: drweb.baseinfo
          delay: 1h
          history: 30d
          trends: '0'
          value_type: TEXT
        - uuid: dcd495409695471b8d7c8b24c0e540a8
          name: 'Dr.Web: last successful update timestamp'
          type: ZABBIX_ACTIVE
          key: drweb.last_update.unixtime
          delay: 1h
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          units: unixtime
          triggers:
            - uuid: ddcb030dee1e45c49b60d072c077cdd1
              expression: 'now()-last(/Template Astra Linux Basic/drweb.last_update.unixtime)>{$DRWEB.UPDATE.MAXAGE} and nodata(/Template Astra Linux Basic/drweb.last_update.unixtime,{$DRWEB.UPDATE.NODATA})=0'
              name: 'Dr.Web: virus databases were not updated recently'
              opdata: 'Last successful update: {ITEM.LASTVALUE}'
              priority: WARNING
      macros:
        - macro: '{$AGENT.NODATA}'
          value: 10m
          description: 'How long agent data may be absent while ICMP is available before raising a monitoring availability problem.'
        - macro: '{$DRWEB.UPDATE.MAXAGE}'
          value: 1d
          description: 'Maximum allowed age of the last successful Dr.Web database update.'
        - macro: '{$DRWEB.UPDATE.NODATA}'
          value: 2h
          description: 'How long Dr.Web update timestamp may be absent before suppressing the stale database trigger.'
