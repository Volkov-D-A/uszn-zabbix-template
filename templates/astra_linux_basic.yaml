zabbix_export:
  version: '7.0'
  template_groups:
    - uuid: 18e6d704c777453d98a6835f393755ec
      name: 'Astra clients'
  host_groups:
    - uuid: 4c469bc127d64a34ba625f7f4244153f
      name: 'Astra clients'
  templates:
    - uuid: 2696cbf6209f45ea8ed58da2082a099c
      template: 'Template Astra Linux Basic'
      name: 'Template Astra Linux Basic'
      groups:
        - name: 'Astra clients'
      items:
        - uuid: 7367c5f8babb479f9b7116bda079f31f
          name: 'Astra Linux: build version'
          type: ZABBIX_ACTIVE
          key: 'vfs.file.contents[/etc/astra_version]'
          delay: 1h
          history: 90d
          trends: '0'
          value_type: TEXT
          triggers:
            - uuid: 34ea47e8691d4673b14b02713757cce5
              expression: 'change(/Template Astra Linux Basic/vfs.file.contents[/etc/astra_version])=1'
              name: 'Astra Linux: build version has changed'
              opdata: 'Current version: {ITEM.LASTVALUE}'
              priority: INFO
              manual_close: 'YES'
        - uuid: 9dd4ed1da70447d7892e70fa31143de3
          name: 'Dr.Web: config daemon active state'
          type: ZABBIX_ACTIVE
          key: 'systemd.unit.info[drweb-configd.service,ActiveState]'
          delay: 1m
          history: 30d
          trends: '0'
          value_type: CHAR
          triggers:
            - uuid: e63a2a31391644708d0577f00a2d477a
              expression: 'last(/Template Astra Linux Basic/systemd.unit.info[drweb-configd.service,ActiveState])<>"active"'
              name: 'Dr.Web: config daemon is not active'
              opdata: 'Current state: {ITEM.LASTVALUE}'
              priority: HIGH
        - uuid: 220dcff3c3c84ee69275509df000ab2c
          name: 'Dr.Web: database timestamp'
          type: ZABBIX_ACTIVE
          key: 'vfs.file.contents[/opt/drweb.com/bases/timestamp]'
          delay: 1h
          history: 90d
          trends: 365d
          value_type: UNSIGNED
          units: unixtime
          triggers:
            - uuid: 7c797227da5e49428c889b10dd80bd3e
              expression: 'now()-last(/Template Astra Linux Basic/vfs.file.contents[/opt/drweb.com/bases/timestamp])>{$DRWEB.BASES.MAXAGE} and nodata(/Template Astra Linux Basic/vfs.file.contents[/opt/drweb.com/bases/timestamp],{$DRWEB.BASES.NODATA})=0'
              name: 'Dr.Web: database timestamp is too old'
              opdata: 'Database timestamp: {ITEM.LASTVALUE}'
              priority: WARNING
      macros:
        - macro: '{$DRWEB.BASES.MAXAGE}'
          value: 2d
          description: 'Maximum allowed age of the Dr.Web database timestamp.'
        - macro: '{$DRWEB.BASES.NODATA}'
          value: 2h
          description: 'How long Dr.Web database timestamp may be absent before suppressing the stale database trigger.'
